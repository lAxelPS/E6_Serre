<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Station ESP32</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <h1>📡 Station de mesure ESP32</h1>

    <div class="dashboard">

        <div class="card">
            <h2>🌡️ Température</h2>
            <p><span id="temperature">--</span> °C</p>
        </div>

        <div class="card">
            <h2>💡 Luminosité</h2>
            <p><span id="luminosite">--</span> %</p>
        </div>

        <div class="card">
            <h2>💧 Humidité de l'air</h2>
            <p><span id="humidite_air">--</span> %</p>
        </div>

        <div class="card">
            <h2>🌱 Humidité du sol</h2>
            <p><span id="humidite_sol">--</span> %</p>
        </div>

    </div>

</body>
</html>

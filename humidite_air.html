<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique Humidité dans l'Air</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>📈 Humidité dans l'air dans le temps</h1>

<canvas id="graph" width="350" height="200"></canvas>

<script>
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

/* EXEMPLE DE DONNÉES
   👉 Ces valeurs viendront de l'ESP32 plus tard */
const humiditeAir = [10, 22.5, 15, 2, 8, 24.1, 24.5];
const temps = [0, 1, 2, 3, 4, 5, 6];

// Nettoyage
ctx.clearRect(0, 0, canvas.width, canvas.height);

// Fond
ctx.fillStyle = "#000";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Axes
ctx.strokeStyle = "#ff8c00";
ctx.beginPath();
ctx.moveTo(40, 10);
ctx.lineTo(40, 180);
ctx.lineTo(330, 180);
ctx.stroke();

// Courbe
ctx.strokeStyle = "#ff8c00";
ctx.lineWidth = 2;
ctx.beginPath();

humiditeAir.forEach((temp, i) => {
    const x = 40 + (i * 40);
    const y = 180 - (temp * 5);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
});

ctx.stroke();

// Points
humiditeAir.forEach((temp, i) => {
    const x = 40 + (i * 40);
    const y = 180 - (temp * 5);
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#ff8c00";
    ctx.fill();
});
</script>

</body>
</html>
